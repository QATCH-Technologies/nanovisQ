[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | build
  | dist
  | \.eggs
  | runs       
  | weights
)/
'''

[tool.isort]
profile = "black"
line_length = 100

# ── Tailor these to your actual top-level package name(s) ──
known_first_party = ["visqai", "app", "models", "pipeline", "ui", "utils", "database"]

known_third_party = [
    "torch", "torchvision", "torchaudio",
    "tensorflow", "keras",
    "numpy", "pandas", "scipy", "sklearn", "matplotlib", "xgboost", "hyperopt",
    "cv2", "ultralytics", "PIL",
    "PyQt5", "pyqtgraph",
    "yaml", "pymysql", "pyserial", "dropbox",
    "cryptography", "rapidfuzz", "pyzipper", "tqdm", "joblib", "shapely",
    "requests", "colorama", "progressbar",
]

force_sort_within_sections = true
combine_as_imports = true
skip_glob = [
    "**/__pycache__/*",
    "**/build/*",
    "**/dist/*",
    "**/runs/*",
    "**/weights/*",
]