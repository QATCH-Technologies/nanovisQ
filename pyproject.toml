[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | build
  | dist
  | \.eggs
  | runs       
  | weights
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = [
    "QATCH",
    "app",
    "make_data_db",
    "make_version",
    "make_clean",
    "build_pyinstaller",
    "move_docs",
    "tagger",
]

known_third_party = [
    # PyTorch
    "torch", "torchvision", "torchaudio",
    # TensorFlow / Keras
    "tensorflow", "keras",
    # Scientific
    "numpy", "pandas", "scipy", "sklearn", "matplotlib",
    "xgboost", "hyperopt", "shapely", "tsmoothie",
    # Vision / YOLO
    "cv2", "ultralytics", "PIL",
    # Qt
    "PyQt5", "pyqtgraph",
    # Data / IO
    "yaml", "pymysql", "pyserial", "dropbox", "pyzipper",
    "cryptography", "rapidfuzz",
    # Utilities
    "tqdm", "joblib", "requests", "colorama",
    "progressbar", "send2trash", "hid",
]

force_sort_within_sections = true
combine_as_imports = true
skip_glob = [
    "**/__pycache__/*",
    "**/build/*",
    "**/dist/*",
    "**/runs/*",
    "**/weights/*",
    "**/SavedModels/*",
    "**/logged_data/*",
    "tools/installer/tags/*",
]
