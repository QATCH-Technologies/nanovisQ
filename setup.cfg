[flake8]
max-line-length = 100
max-complexity = 12
extend-ignore =
    E203,
    W503,
    E741,
    B008,
    N803,
    N806,
    D100,
    D101,
    D102,
    D103,
    D104,
    D105,
    D107
per-file-ignores =
    __init__.py: F401, F403
    tests/*: S101, PLR2004
    **/ui/*: N802, N803, N806
    **/migrations/*: E501
extend-select = B, B9
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    runs,
    weights,
    nanovisQ/QATCH,
    tools

[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
show_error_codes = True
pretty = True
exclude = (build|dist|\.venv|runs|weights|migrations|tools|logged_data|QATCH/QModel|QATCH/nightly|QATCH/models|QATCH/FluxControls|QATCH_Q-1_FW_py_dev)