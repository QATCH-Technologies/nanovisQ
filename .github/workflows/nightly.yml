name: "nightly"

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '5 5 * * *' # runs daily at 05:05 UTC

jobs:
  nightly_build:
    # NOTE: By default, a job with `needs` will refuse to run
    # if any dependency was skipped or failed. Use of `always()`
    # overrides that gate so the `if` itself controls execution.
    needs: [check_date]
    if: |
      ${{ always() &&
        ( 
          github.event_name == 'workflow_dispatch' ||
          needs.check_date.outputs.should_run == 'true' 
        )
      }}
    runs-on: windows-latest
    name: Build nanovisQ nightly
    outputs:
      tag_name: ${{ steps.tagger.outputs.tag_name }}
    steps:
      - name: Checkout repo to 'trunk'
        uses: actions/checkout@v6
        with:
          path: trunk
        
      - name: Setup Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # cache: 'pip' # caching pip dependencies
      # - run: python -m pip install --upgrade pip
      # - run: python -m pip install -r trunk/requirements.txt
          
      - name: Run nightly build script (w/ outputs)
        id: tagger
        run: |
          python trunk/tagger.py --nightly
          echo "tag_name=$(cat tag_name.var)" >> "$env:GITHUB_OUTPUT"

      - name: Print build output variable
        run: |
          echo "tag_name: ${{ steps.tagger.outputs.tag_name }}"

      - name: Archive build artifacts
        uses: actions/upload-artifact@v6
        env:
          tag_name: ${{ steps.tagger.outputs.tag_name }}
        with:
          name: ${{ env.tag_name }}
          path: tags/nightly/${{ env.tag_name }}/dist/*.zip
          if-no-files-found: error
          retention-days: 7

  check_date:
    runs-on: ubuntu-latest
    name: Check latest commit
    # Only bother running this job if triggered by schedule
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - name: Print latest_commit
        run: echo ${{ github.sha }}
      - id: should_run
        continue-on-error: true
        name: Check latest commit is less than a day
        run: |
          test -n "$(git rev-list --after="24 hours" ${{ github.sha }})" \
            && echo "should_run=true" >> "$GITHUB_OUTPUT" \
            || echo "should_run=false" >> "$GITHUB_OUTPUT"